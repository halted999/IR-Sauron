worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Загрузка образов дисков / дампов памяти — до 20 ГБ
    client_max_body_size 20g;
    client_body_timeout 3600s;
    proxy_read_timeout 3600s;

    # Сжатие текстовых ответов API
    gzip on;
    gzip_comp_level 4;
    gzip_types application/json text/plain application/javascript text/css application/xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'none';" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_upload:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_export:10m   rate=20r/m;

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # TLS 1.2+ (требование ТЗ раздел 4.3)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:20m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Auth endpoints (строгий rate limit) ──────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://backend/v1/auth/;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Загрузка артефактов ───────────────────────────────────────────────
        location /api/v1/artifacts/upload {
            limit_req zone=api_upload burst=3 nodelay;
            proxy_pass http://backend/v1/artifacts/upload;
            include /etc/nginx/proxy_params.conf;
            client_max_body_size 20g;
            proxy_read_timeout 3600s;
        }

        # ── Экспорт (PDF/STIX/JSON) ───────────────────────────────────────────
        location ~ ^/api(/v1/cases/[^/]+/export) {
            limit_req zone=api_export burst=5 nodelay;
            proxy_pass http://backend$1;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api_general burst=120 nodelay;
            proxy_pass http://backend/v1/;
            include /etc/nginx/proxy_params.conf;
        }

        # ── WebSocket (real-time совместная работа, раздел 3.5.1) ─────────────
        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── OpenAPI docs (только внутри сети — можно закрыть в prod) ─────────
        location /api/docs {
            allow 127.0.0.1;
            allow 172.20.0.0/24;
            deny all;
            proxy_pass http://backend/docs;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Frontend SPA ─────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend/;
            include /etc/nginx/proxy_params.conf;
            # SPA fallback
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend/index.html;
            include /etc/nginx/proxy_params.conf;
        }
    }
}
