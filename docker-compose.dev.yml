version: '3.9'

# Оверрайд для разработки: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"   # только HTTP в dev

  backend:
    build:
      target: development
    volumes:
      - ./backend:/app:delegated
    environment:
      DEBUG: "true"
      LOG_LEVEL: debug
      RELOAD: "true"
      # Облегчённые требования в dev
      MFA_REQUIRED_ROLES: ""
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    ports:
      - "8000:8000"   # прямой доступ к API при разработке

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app:delegated
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"   # Vite HMR
      - "24678:24678"

  postgres:
    ports:
      - "5432:5432"   # прямой доступ для IDE/psql

  redis:
    ports:
      - "6379:6379"

  minio:
    environment:
      MINIO_BROWSER: "on"   # MinIO Console включена в dev
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI

  # pgAdmin — только в dev
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: irt-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@irt.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - irt-back
      - irt-front

volumes:
  pgadmin_data:
  frontend_node_modules:
