# Nginx config внутри frontend-контейнера — раздача статики React SPA
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Кэширование статических ассетов Vite (у них hash в имени)
    location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — все пути отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Не отдавать скрытые файлы
    location ~ /\. {
        deny all;
    }
}
